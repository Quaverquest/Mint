<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mint Browser</title>
<style>
  :root {
    --bg-app: #0a1a14;
    --bg-panel: #162a22;
    --bg-input: #0d1f18;
    --accent: #28c87a;
    --text-main: #d8f5ea;
    --text-dim: #5a8a72;
    --border: #2e5042;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
    background: var(--bg-app); 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; 
    color: var(--text-main);
  }

  /* Title bar */
  .titlebar { 
    background: #12241e; 
    padding: 12px 14px 0; 
    display: flex; 
    flex-direction: column; 
    border-bottom: 1px solid var(--border);
  }
  .traffic-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; transition: transform 0.1s; }
  .dot:hover { transform: scale(1.1); }
  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #28c840; }
  .brand { margin-left: 12px; font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 1px; opacity: 0.8; }
  
  /* Tabs */
  .tabs-row { display: flex; align-items: flex-end; gap: 6px; }
  .tab { 
    background: var(--bg-panel); 
    color: var(--text-dim); 
    font-size: 12px; 
    padding: 8px 16px; 
    border-radius: 8px 8px 0 0; 
    cursor: pointer; 
    border: 1px solid transparent;
    transition: all 0.2s;
    min-width: 120px;
  }
  .tab.active { 
    background: var(--bg-app); 
    color: var(--text-main); 
    border-color: var(--border); 
    border-bottom-color: var(--bg-app); 
    font-weight: 500;
  }

  /* Toolbar */
  .toolbar { 
    background: var(--bg-panel); 
    padding: 10px 16px; 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    border-bottom: 1px solid var(--border); 
  }
  .nav-btn { 
    background: none; 
    border: none; 
    color: var(--accent); 
    cursor: pointer; 
    font-size: 16px; 
    padding: 6px; 
    border-radius: 6px; 
    transition: background 0.15s; 
  }
  .nav-btn:hover { background: rgba(40, 200, 122, 0.1); }
  
  /* Address Bar Group */
  .address-group {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 8px;
    transition: border-color 0.2s;
  }
  .address-group:focus-within { border-color: var(--accent); }

  .engine-select {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    padding-right: 8px;
    border-right: 1px solid var(--border);
    margin-right: 8px;
    cursor: pointer;
    outline: none;
  }
  .engine-select:hover { color: var(--accent); }
  .engine-select option { background: var(--bg-panel); color: var(--text-main); }

  .url-input { 
    background: none; 
    border: none; 
    outline: none; 
    color: var(--text-main); 
    font-size: 13px; 
    flex: 1; 
    font-family: inherit; 
  }

  /* Proxy Switch */
  .proxy-switch {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .proxy-checkbox { accent-color: var(--accent); }

  /* Content */
  .content { flex: 1; position: relative; background: #fff; }
  iframe { width: 100%; height: 100%; border: none; display: block; }
  
  /* New Tab Page */
  .newtab-container { 
    position: absolute; top:0; left:0; width:100%; height:100%; 
    display: flex; flex-direction: column; 
    align-items: center; justify-content: center; 
    background: var(--bg-app); 
    gap: 24px;
    z-index: 10;
  }
  .mint-logo-big { font-size: 56px; font-weight: 800; color: var(--accent); letter-spacing: -2px; }
  .mint-logo-big span { color: var(--text-dim); }
  
  .nt-search { 
    display: flex; 
    align-items: center; 
    background: var(--bg-panel); 
    border: 1px solid var(--border); 
    border-radius: 100px; 
    padding: 16px 28px; 
    width: 100%; 
    max-width: 520px; 
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    transition: transform 0.2s;
  }
  .nt-search:focus-within { transform: scale(1.02); border-color: var(--accent); }
  .nt-search input { 
    background: none; border: none; outline: none; 
    color: var(--text-main); font-size: 16px; flex: 1; 
  }
</style>
</head>
<body>

<div class="titlebar">
  <div class="traffic-row">
    <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
    <span class="brand">MINT</span>
  </div>
  <div class="tabs-row">
    <div class="tab active" onclick="resetToHome()">New Tab</div>
    <div class="tab" style="opacity:0.5">Drafts</div>
  </div>
</div>

<div class="toolbar">
  <button class="nav-btn" onclick="resetToHome()">⌂</button>
  <button class="nav-btn" onclick="refreshIframe()">↻</button>
  
  <div class="address-group">
    <select id="engine-select" class="engine-select">
      <option value="google">G</option>
      <option value="bing">B</option>
      <option value="ddg">D</option>
    </select>
    <input class="url-input" id="url-bar" type="text" placeholder="Search or enter URL..." onkeydown="if(event.key==='Enter')handleNavigation()" />
  </div>

  <label class="proxy-switch" title="Attempt to unblock sites (Experimental)">
    <input type="checkbox" id="proxy-toggle" class="proxy-checkbox">
    <span>Proxy Mode</span>
  </label>
</div>

<div class="content" id="content-area">
  <div id="newtab-view" class="newtab-container">
    <div class="mint-logo-big">mint<span>.</span></div>
    <div class="nt-search">
      <input type="text" id="nt-input" placeholder="Search the web..." onkeydown="if(event.key==='Enter')handleNavigation(this.value)">
    </div>
  </div>
  <iframe id="web-frame" src="" style="display:none;"></iframe>
</div>

<script>
const webFrame = document.getElementById('web-frame');
const newTabView = document.getElementById('newtab-view');
const urlBar = document.getElementById('url-bar');
const engineSelect = document.getElementById('engine-select');
const proxyToggle = document.getElementById('proxy-toggle');

function handleNavigation(customValue) {
    let input = customValue || urlBar.value || document.getElementById('nt-input').value;
    if (!input) return;
    input = input.trim();

    let targetUrl = '';
    const isUrl = input.includes('.') && !input.includes(' ');

    if (isUrl) {
        targetUrl = input.startsWith('http') ? input : 'https://' + input;
    } else {
        const engine = engineSelect.value;
        const query = encodeURIComponent(input);
        if (engine === 'google') targetUrl = `https://google.com{query}&igu=1`;
        else if (engine === 'bing') targetUrl = `https://bing.com{query}`;
        else if (engine === 'ddg') targetUrl = `https://duckduckgo.com{query}`;
    }

    // Proxy Logic
    if (proxyToggle.checked) {
        // Using corsproxy.io as a public gateway example
        targetUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
    }

    loadPage(targetUrl);
    urlBar.value = targetUrl; // Show actual URL being loaded
}

function loadPage(url) {
    newTabView.style.display = 'none';
    webFrame.style.display = 'block';
    webFrame.src = url;
}

function resetToHome() {
    newTabView.style.display = 'flex';
    webFrame.style.display = 'none';
    webFrame.src = '';
    urlBar.value = '';
    document.getElementById('nt-input').value = '';
    document.getElementById('nt-input').focus();
}

function refreshIframe() {
    if (webFrame.src) webFrame.contentWindow.location.reload();
}
</script>

</body>
</html>
