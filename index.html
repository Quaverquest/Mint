<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mint OS v7.0 - Arcade</title>
<style>
  :root {
    --bg: #050a08; --glass: rgba(20, 30, 25, 0.85); --glass-border: rgba(255, 255, 255, 0.1);
    --accent: #28c87a; --text: #e0e6e3; --dim: #6b7d75; --error: #ff5f57;
    --font-code: 'Fira Code', 'Consolas', monospace; --font-ui: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
  body { 
    font-family: var(--font-ui); background: var(--bg); color: var(--text); 
    height: 100vh; overflow: hidden; display: flex; flex-direction: column;
    background-size: cover; background-position: center;
  }

  /* Layout Components */
  .app-body { flex: 1; display: flex; overflow: hidden; }
  .sidebar { width: 240px; background: var(--glass); backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; z-index: 20; }
  .sidebar-header { padding: 18px; font-size: 12px; font-weight: 800; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); color: var(--accent); }
  
  .file-list { flex: 1; overflow-y: auto; padding: 10px 0; }
  .file-item { padding: 10px 18px; font-size: 13px; color: var(--dim); cursor: pointer; display: flex; align-items: center; gap: 10px; border-left: 3px solid transparent; transition: 0.2s; }
  .file-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .file-item.active { background: rgba(40, 200, 122, 0.15); color: var(--accent); border-left-color: var(--accent); }
  
  /* Workspace & Toolbar */
  .workspace { flex: 1; display: flex; flex-direction: column; position: relative; background: rgba(0,0,0,0.6); }
  .toolbar { height: 54px; display: flex; align-items: center; padding: 0 15px; gap: 12px; border-bottom: 1px solid var(--glass-border); background: var(--glass); backdrop-filter: blur(10px); }
  
  .btn { background: none; border: 1px solid transparent; color: var(--accent); padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; font-size: 14px; }
  .btn:hover { background: rgba(40, 200, 122, 0.15); border-color: rgba(40, 200, 122, 0.3); }
  .btn.active { background: var(--accent); color: #000; font-weight: bold; }
  .btn-danger { color: var(--error); } .btn-danger:hover { background: rgba(255, 95, 87, 0.1); }

  .address-bar { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: var(--font-code); font-size: 13px; transition: 0.3s; }
  .address-bar:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(40, 200, 122, 0.2); }

  /* Split View & Editor */
  .split-container { flex: 1; display: flex; overflow: hidden; }
  .pane { flex: 1; display: flex; flex-direction: column; border-left: 1px solid var(--glass-border); position: relative; min-width: 0; transition: 0.3s; }
  .pane.hidden { display: none; }
  
  .editor-wrapper { flex: 1; position: relative; display: flex; background: #0e1210; }
  .gutter { width: 45px; background: #090c0b; border-right: 1px solid #1e2824; padding-top: 15px; text-align: right; padding-right: 10px; color: #3a4a44; font-family: var(--font-code); font-size: 13px; line-height: 1.6; user-select: none; }
  .code-stack { flex: 1; position: relative; overflow: hidden; }
  
  /* Syntax Highlighting Layers */
  .editor-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; margin: 0; padding: 15px; border: 0; font-family: var(--font-code); font-size: 13px; line-height: 1.6; tab-size: 2; white-space: pre; overflow: auto; }
  textarea.editor-layer { z-index: 2; background: transparent; color: transparent; caret-color: var(--accent); resize: none; }
  pre.editor-layer { z-index: 1; pointer-events: none; color: #a8b5b0; }
  
  .token-tag { color: #ff5f57; } .token-attr { color: #ffbd2e; } .token-val { color: #28c87a; }
  .token-comment { color: #556660; font-style: italic; } 

  /* Preview Frame */
  .preview-frame { flex: 1; border: none; background: white; transition: 0.3s; }
  .preview-frame.mobile { max-width: 375px; margin: 20px auto; border: 12px solid #222; border-radius: 25px; height: 667px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }

  /* Modals */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
  .modal { background: #111916; border: 1px solid var(--glass-border); padding: 30px; border-radius: 16px; width: 450px; box-shadow: 0 25px 60px rgba(0,0,0,0.8); }
  .modal h3 { color: var(--accent); margin-bottom: 20px; font-size: 18px; display: flex; align-items: center; gap: 10px; }
  
  .lib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .lib-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; text-align: center; }
  .lib-card:hover { background: rgba(40, 200, 122, 0.1); border-color: var(--accent); transform: translateY(-2px); }
  .lib-icon { font-size: 24px; margin-bottom: 8px; display: block; }
  .lib-title { font-size: 12px; font-weight: bold; color: var(--text); }

  /* Status Bar */
  .status-bar { height: 28px; background: var(--glass); border-top: 1px solid var(--glass-border); display: flex; align-items: center; padding: 0 15px; font-size: 11px; color: var(--dim); justify-content: space-between; }
</style>
</head>
<body>

<div class="app-body">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>MINT OS v7.0</span>
      <button class="btn" onclick="toggleSettings()" title="Settings">⚙️</button>
    </div>
    <div class="file-list" id="file-list"></div>
    <div style="padding:15px; border-top:1px solid var(--glass-border)">
      <button class="btn" style="width:100%; justify-content:center" onclick="showLibrary()">📦 App Library</button>
      <div style="display:flex; gap:5px; margin-top:8px">
        <button class="btn" style="flex:1; justify-content:center" onclick="createFile('studio')">+ Code</button>
        <button class="btn" style="flex:1; justify-content:center" onclick="createFile('browser')">+ Web</button>
      </div>
    </div>
  </aside>

  <main class="workspace">
    <div class="toolbar">
      <button class="btn" onclick="toggleSidebar()">🗂️</button>
      <button class="btn" onclick="setSplitMode(!isSplit)" id="btn-split">🌗 Split</button>
      <input type="text" class="address-bar" id="omni-bar" placeholder="Search URL or Filename..." onkeydown="if(event.key==='Enter') handleOmni()">
      <button class="btn" onclick="toggleMobile()" id="btn-mobile" title="Mobile Emulator">📱</button>
      <button class="btn" onclick="downloadWorkspace()" title="Save to Cloud">☁️</button>
      <button class="btn btn-danger" onclick="deleteCurrent()">🗑️</button>
    </div>

    <div class="split-container" id="split-view">
      <!-- Pane 1: Editor or Browser -->
      <div class="pane" id="pane-1">
        <div class="editor-wrapper" id="editor-1" style="display:none">
          <div class="gutter" id="gutter-1">1</div>
          <div class="code-stack">
            <pre class="editor-layer"><code id="highlighter-1"></code></pre>
            <textarea class="editor-layer" id="input-1" oninput="handleInput(1)" onkeydown="handleKey(event, 1)" spellcheck="false"></textarea>
          </div>
        </div>
        <iframe class="preview-frame" id="frame-1" style="display:none"></iframe>
      </div>

      <!-- Pane 2: Preview (in Split Mode) -->
      <div class="pane hidden" id="pane-2">
        <iframe class="preview-frame" id="frame-2"></iframe>
      </div>
    </div>
    
    <div class="status-bar">
      <span id="status-msg">System Ready</span>
      <span id="status-mem">Mem: 0kb</span>
    </div>
  </main>
</div>

<!-- Library Modal -->
<div class="modal-overlay" id="lib-modal" onclick="if(event.target===this) this.style.display='none'">
  <div class="modal">
    <h3>📦 Application Library</h3>
    <div class="lib-grid">
      <div class="lib-card" onclick="loadTemplate('cps')">
        <span class="lib-icon">⚡</span>
        <span class="lib-title">Click Speed Test</span>
      </div>
      <div class="lib-card" onclick="loadTemplate('wpm')">
        <span class="lib-icon">⌨️</span>
        <span class="lib-title">Typing Speed Test</span>
      </div>
      <div class="lib-card" onclick="loadTemplate('snake')">
        <span class="lib-icon">🐍</span>
        <span class="lib-title">Snake Game</span>
      </div>
      <div class="lib-card" onclick="loadTemplate('calc')">
        <span class="lib-icon">🔢</span>
        <span class="lib-title">Calculator</span>
      </div>
    </div>
    <button class="btn" style="width:100%; margin-top:20px; justify-content:center" onclick="document.getElementById('lib-modal').style.display='none'">Close</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal" onclick="if(event.target===this) toggleSettings()">
  <div class="modal">
    <h3>⚙️ System Settings</h3>
    <input type="text" class="address-bar" style="width:100%; margin-bottom:15px" placeholder="Wallpaper URL (http://...)" onchange="setWallpaper(this.value)">
    <button class="btn" onclick="localStorage.clear(); location.reload()">⚠️ Factory Reset</button>
  </div>
</div>

<script>
// --- DATA & TEMPLATES ---
const TEMPLATES = {
  studio: `<!DOCTYPE html>\n<html>\n<style>\n  body { display: grid; place-items: center; height: 100vh; background: #111; color: #fff; font-family: sans-serif; }\n  h1 { color: #28c87a; border-bottom: 2px solid; }\n</style>\n<body>\n  <h1>Mint OS</h1>\n</body>\n</html>`,
  
  cps: `<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #050a08; color: #d8f5ea; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; user-select: none; }
  .box { background: #162a22; border: 2px solid #2e5042; padding: 40px; border-radius: 20px; text-align: center; width: 300px; }
  .btn { background: #28c87a; color: #000; border: none; padding: 20px; width: 100%; font-size: 24px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.1s; margin-top: 20px; }
  .btn:active { transform: scale(0.95); background: #20a060; }
  .stat { font-size: 18px; color: #5a8a72; margin: 10px 0; }
  .big { font-size: 48px; font-weight: 800; color: #fff; }
</style>
</head>
<body>
  <div class="box">
    <div class="stat">CLICKS / SEC</div>
    <div class="big" id="cps">0.0</div>
    <div class="stat" id="timer">Time: 10s</div>
    <button class="btn" id="clicker" onmousedown="handleClick()">CLICK ME!</button>
    <button onclick="location.reload()" style="background:none; border:none; color:#5a8a72; margin-top:15px; cursor:pointer; text-decoration:underline">Reset</button>
  </div>

  <script>
    let clicks = 0;
    let startTime = null;
    let ended = false;
    
    function handleClick() {
      if (ended) return;
      if (!startTime) {
        startTime = Date.now();
        requestAnimationFrame(loop);
      }
      clicks++;
    }
    
    function loop() {
      if (ended) return;
      const elapsed = (Date.now() - startTime) / 1000;
      if (elapsed >= 10) {
        ended = true;
        document.getElementById('timer').innerText = "Done!";
        document.getElementById('clicker').innerText = "Finished";
        return;
      }
      document.getElementById('timer').innerText = "Time: " + (10 - elapsed).toFixed(1) + "s";
      document.getElementById('cps').innerText = (clicks / elapsed).toFixed(1);
      requestAnimationFrame(loop);
    }
  <\/script>
</body>
</html>`,

  wpm: `<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111; color: #eee; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
  .container { max-width: 600px; width: 100%; }
  #display { font-size: 24px; line-height: 1.5; margin-bottom: 20px; color: #666; user-select: none; }
  .correct { color: #28c87a; }
  .wrong { color: #ff5f57; text-decoration: underline; }
  textarea { width: 100%; height: 100px; background: #222; border: 2px solid #333; color: white; font-size: 24px; padding: 15px; border-radius: 10px; outline: none; resize: none; font-family: inherit; }
  textarea:focus { border-color: #28c87a; }
  .stats { display: flex; gap: 20px; margin-top: 20px; font-size: 20px; font-weight: bold; }
  .stat-box { background: #222; padding: 10px 20px; border-radius: 8px; border: 1px solid #333; }
  span.val { color: #28c87a; }
</style>
</head>
<body>
  <div class="container">
    <h2 style="color:#28c87a">Typing Speed Test</h2>
    <div id="display"></div>
    <textarea id="input" placeholder="Start typing here..." oninput="processInput()"></textarea>
    <div class="stats">
      <div class="stat-box">WPM: <span class="val" id="wpm">0</span></div>
      <div class="stat-box">Acc: <span class="val" id="acc">100%</span></div>
      <div class="stat-box">Time: <span class="val" id="time">0s</span></div>
    </div>
    <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; background:#333; color:#fff; border:none; cursor:pointer; border-radius:5px">Restart</button>
  </div>

  <script>
    const text = "The quick brown fox jumps over the lazy dog and runs away into the forest to find a new home.";
    const display = document.getElementById('display');
    const input = document.getElementById('input');
    let startTime = null;
    let ended = false;

    // Init display
    text.split('').forEach(char => {
      const s = document.createElement('span');
      s.innerText = char;
      display.appendChild(s);
    });

    function processInput() {
      if (ended) return;
      if (!startTime) {
        startTime = Date.now();
        setInterval(updateStats, 100);
      }

      const val = input.value;
      const spans = display.querySelectorAll('span');
      let errors = 0;

      val.split('').forEach((char, i) => {
        if (spans[i]) {
          if (char === spans[i].innerText) {
            spans[i].className = 'correct';
          } else {
            spans[i].className = 'wrong';
            errors++;
          }
        }
      });

      // Reset future chars
      for (let i = val.length; i < text.length; i++) spans[i].className = '';

      // Check End
      if (val.length >= text.length) {
        ended = true;
        input.disabled = true;
      }
    }

    function updateStats() {
      if (ended) return;
      const elapsed = (Date.now() - startTime) / 1000 / 60; // mins
      const words = input.value.length / 5;
      const wpm = Math.round(words / elapsed);
      document.getElementById('wpm').innerText = wpm || 0;
      document.getElementById('time').innerText = Math.round(elapsed * 60) + 's';
      
      // Accuracy
      const correct = document.querySelectorAll('.correct').length;
      const total = input.value.length;
      const acc = total ? Math.round((correct / total) * 100) : 100;
      document.getElementById('acc').innerText = acc + '%';
    }
  <\/script>
</body>
</html>`,

  snake: `<!DOCTYPE html><html><body style="background:#050a08; color:#28c87a; display:flex; flex-direction:column; align-items:center; font-family:sans-serif;"><h2>Mint Snake</h2><canvas id="c" width="300" height="300" style="border:2px solid #28c87a; background:#000"></canvas><p>Use Arrow Keys</p><script>let c=document.getElementById("c").getContext("2d"),s=[{x:10,y:10}],f={x:15,y:15},d={x:0,y:0};setInterval(()=>{let h={x:s[0].x+d.x,y:s[0].y+d.y};if(h.x<0)h.x=19;if(h.x>19)h.x=0;if(h.y<0)h.y=19;if(h.y>19)h.y=0;s.unshift(h);if(h.x==f.x&&h.y==f.y)f={x:Math.random()*20|0,y:Math.random()*20|0};else s.pop();c.fillStyle="#000";c.fillRect(0,0,300,300);c.fillStyle="#ff5f57";c.fillRect(f.x*15,f.y*15,14,14);c.fillStyle="#28c87a";s.forEach(p=>c.fillRect(p.x*15,p.y*15,14,14))},100);window.onkeydown=e=>{let k=e.key;if(k.includes("Up"))d={x:0,y:-1};if(k.includes("Down"))d={x:0,y:1};if(k.includes("Left"))d={x:-1,y:0};if(k.includes("Right"))d={x:1,y:0}}<\/script></body></html>`,
  calc: `<!DOCTYPE html><html><style>body{background:#111;display:flex;justify-content:center;align-items:center;height:100vh}#c{width:200px;background:#222;padding:10px;border-radius:10px;border:1px solid #333}input{width:100%;background:#000;border:none;color:#fff;font-size:24px;text-align:right;padding:10px;box-sizing:border-box;margin-bottom:10px}button{width:22%;height:40px;margin:1%;background:#333;border:none;color:#fff;border-radius:5px;cursor:pointer}button:hover{background:#444}.eq{background:#28c87a;color:#000}</style><body><div id="c"><input id="d"><br><button onclick="d.value+='1'">1</button><button onclick="d.value+='2'">2</button><button onclick="d.value+='3'">3</button><button onclick="d.value+='+'">+</button><br><button onclick="d.value+='4'">4</button><button onclick="d.value+='5'">5</button><button onclick="d.value+='6'">6</button><button onclick="d.value+='-'">-</button><br><button onclick="d.value+='7'">7</button><button onclick="d.value+='8'">8</button><button onclick="d.value+='9'">9</button><button onclick="d.value+='*'">*</button><br><button onclick="d.value=''">C</button><button onclick="d.value+='0'">0</button><button class="eq" onclick="d.value=eval(d.value)">=</button><button onclick="d.value+='/'">/</button></div></body></html>`
};

let files = [];
let activeId = null;
let isSplit = false;

// --- INIT ---
window.onload = () => {
  if(localStorage.getItem('mint-os-v7')) {
    const data = JSON.parse(localStorage.getItem('mint-os-v7'));
    files = data.files;
    if (data.bg) document.body.style.backgroundImage = `url(${data.bg})`;
  } else {
    createFile('studio', 'Welcome.html');
  }
  renderFiles();
};

// --- CORE ---
function createFile(type, title, content) {
  const id = 'f' + Date.now();
  const file = { id, type, title: title||(type==='studio'?'Untitled.html':'New Tab'), url:'', content: content||TEMPLATES[type] };
  files.push(file);
  switchFile(id);
  save();
}

function switchFile(id) {
  activeId = id;
  renderFiles();
  const file = files.find(f => f.id === id);
  
  // Reset Panes
  document.getElementById('editor-1').style.display = 'none';
  document.getElementById('frame-1').style.display = 'none';
  document.getElementById('frame-2').src = 'about:blank';

  if (file.type === 'studio') {
    document.getElementById('editor-1').style.display = 'flex';
    document.getElementById('input-1').value = file.content;
    highlight(1);
    updatePreview(file.content);
    document.getElementById('omni-bar').value = file.title;
  } else {
    document.getElementById('frame-1').style.display = 'block';
    if (file.url) document.getElementById('frame-1').src = file.url;
    else {
      const doc = document.getElementById('frame-1').contentDocument;
      doc.open(); doc.write('<body style="background:#fff;display:flex;justify-content:center;align-items:center;height:100vh;color:#ccc;font-family:sans-serif"><h1>Mint Browser</h1></body>'); doc.close();
    }
    document.getElementById('omni-bar').value = file.url;
  }
}

function updatePreview(content) {
  if(isSplit) {
    const doc = document.getElementById('frame-2').contentDocument;
    doc.open(); doc.write(content); doc.close();
  }
}

function handleInput(pane) {
  const val = document.getElementById('input-'+pane).value;
  const file = files.find(f => f.id === activeId);
  if(file) {
    file.content = val;
    highlight(pane);
    // Debounce
    clearTimeout(file.timer);
    file.timer = setTimeout(() => updatePreview(val), 500);
    save();
  }
}

// --- UI & UTILS ---
function renderFiles() {
  const list = document.getElementById('file-list');
  list.innerHTML = '';
  files.forEach(f => {
    const el = document.createElement('div');
    el.className = `file-item ${f.id===activeId?'active':''}`;
    el.innerHTML = f.type==='studio' ? '📄 '+f.title : '🌐 '+f.title;
    el.onclick = () => switchFile(f.id);
    list.appendChild(el);
  });
  updateMem();
}

function showLibrary() { document.getElementById('lib-modal').style.display = 'flex'; }
function loadTemplate(key) {
  createFile('studio', key.toUpperCase() + ' App.html', TEMPLATES[key]);
  document.getElementById('lib-modal').style.display = 'none';
}

function highlight(pane) {
  const code = document.getElementById('input-'+pane).value;
  let html = code.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  html = html.replace(/(&lt;\/?)(\w+)(.*?)((?:\/)?&gt;)/g, '<span class="token-tag">$1$2</span>$3<span class="token-tag">$4</span>');
  document.getElementById('highlighter-'+pane).innerHTML = html;
  
  // Sync Scroll
  const inp = document.getElementById('input-'+pane);
  const pre = document.getElementById('highlighter-'+pane).parentElement;
  const gut = document.getElementById('gutter-'+pane);
  inp.onscroll = () => { pre.scrollTop = inp.scrollTop; pre.scrollLeft = inp.scrollLeft; };
  
  // Lines
  gut.innerHTML = Array(code.split('\n').length).fill(0).map((_,i)=>i+1).join('<br>');
}

function handleKey(e, pane) {
  if(e.key==='Tab') { e.preventDefault(); document.execCommand('insertText', false, '  '); }
}

function setSplitMode(val) {
  isSplit = val;
  document.getElementById('pane-2').classList.toggle('hidden', !val);
  document.getElementById('btn-split').classList.toggle('active', val);
  if(val) switchFile(activeId); // refresh preview
}

function toggleMobile() {
  document.getElementById('frame-1').classList.toggle('mobile');
  document.getElementById('frame-2').classList.toggle('mobile');
  document.getElementById('btn-mobile').classList.toggle('active');
}

function handleOmni() {
  const val = document.getElementById('omni-bar').value;
  const file = files.find(f => f.id === activeId);
  if(file.type === 'browser') {
    file.url = val.includes('.') ? (val.startsWith('http')?val:'https://'+val) : 'https://www.google.com/search?q='+encodeURIComponent(val)+'&igu=1';
    file.title = val;
    switchFile(activeId);
  } else {
    file.title = val;
    renderFiles();
  }
  save();
}

function deleteCurrent() {
  files = files.filter(f => f.id !== activeId);
  if(files.length===0) createFile('studio');
  else switchFile(files[0].id);
}

function toggleSettings() { 
  const el = document.getElementById('settings-modal'); 
  el.style.display = el.style.display==='flex'?'none':'flex'; 
}
function toggleSidebar() {
  const el = document.getElementById('sidebar');
  el.style.display = el.style.display==='none'?'flex':'none';
}

function setWallpaper(url) {
  document.body.style.backgroundImage = `url(${url})`;
  const data = JSON.parse(localStorage.getItem('mint-os-v7') || '{}');
  data.bg = url;
  localStorage.setItem('mint-os-v7', JSON.stringify(data));
}

function save() {
  const data = JSON.parse(localStorage.getItem('mint-os-v7') || '{}');
  data.files = files;
  localStorage.setItem('mint-os-v7', JSON.stringify(data));
  updateMem();
}

function updateMem() {
  const size = new Blob([JSON.stringify(files)]).size;
  document.getElementById('status-mem').innerText = `Mem: ${(size/1024).toFixed(1)}kb`;
}

function downloadWorkspace() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify({files})], {type:'application/json'}));
  a.download = 'mint-backup.json';
  a.click();
}
</script>
</body>
</html>
