<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Browser Emulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .url-bar {
            flex: 1;
            min-width: 200px;
        }

        .url-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .url-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .url-input::placeholder {
            color: #999;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .go-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-width: 70px;
        }

        .go-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .go-btn:active {
            transform: translateY(0);
        }

        .clear-btn {
            background: #f0f0f0;
            color: #333;
            min-width: 70px;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .browser-window {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }

        .browser-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .loading-spinner.active {
            opacity: 1;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-bar {
            padding: 10px 20px;
            background: #f9f9f9;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
            font-family: 'Courier New', monospace;
        }

        .error-message {
            color: #d32f2f;
            padding: 15px 20px;
            background: #ffebee;
            border-radius: 8px;
            display: none;
            margin-top: 10px;
            border-left: 4px solid #d32f2f;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                height: auto;
                min-height: 100vh;
            }

            .header {
                flex-direction: column;
            }

            .url-bar {
                min-width: 100%;
            }

            .button-group {
                width: 100%;
            }

            button {
                flex: 1;
            }

            .browser-window {
                min-height: 500px;
                flex: 1;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 10px 15px;
            }

            .url-input {
                padding: 10px 12px;
                font-size: 16px;
            }

            button {
                padding: 10px 16px;
                font-size: 12px;
            }

            .browser-window {
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="url-bar">
                <input 
                    type="text" 
                    class="url-input" 
                    id="urlInput" 
                    placeholder="Enter a website URL (e.g., https://example.com)"
                    autocomplete="off"
                >
            </div>
            <div class="button-group">
                <button class="go-btn" id="goBtn">Go</button>
                <button class="clear-btn" id="clearBtn">Clear</button>
            </div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="browser-window">
            <div class="browser-content">
                <div class="loading-spinner" id="loadingSpinner">
                    <div class="spinner"></div>
                </div>
                <iframe id="browserFrame" title="Web Browser Emulator Content"></iframe>
            </div>
            <div class="status-bar" id="statusBar">Ready</div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const goBtn = document.getElementById('goBtn');
        const clearBtn = document.getElementById('clearBtn');
        const browserFrame = document.getElementById('browserFrame');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const statusBar = document.getElementById('statusBar');
        const errorMessage = document.getElementById('errorMessage');

        // Format URL properly
        function formatURL(url) {
            url = url.trim();
            
            if (!url) {
                return '';
            }

            // If URL doesn't start with a protocol, add https://
            if (!url.match(/^https?:\/\//i)) {
                // Check if it looks like localhost or IP address
                if (url.startsWith('localhost') || url.match(/^(\d{1,3}\.){3}\d{1,3}/)) {
                    url = 'http://' + url;
                } else {
                    url = 'https://' + url;
                }
            }

            return url;
        }

        // Validate URL
        function isValidURL(url) {
            try {
                new URL(url);
                return true;
            } catch (e) {
                return false;
            }
        }

        // Load website
        function loadWebsite() {
            const url = urlInput.value.trim();

            if (!url) {
                showError('Please enter a URL');
                return;
            }

            const formattedURL = formatURL(url);

            if (!isValidURL(formattedURL)) {
                showError('Please enter a valid URL');
                return;
            }

            clearError();
            showLoading(true);
            statusBar.textContent = `Loading: ${formattedURL}`;

            // Update the input with formatted URL
            urlInput.value = formattedURL;

            // Load the URL
            browserFrame.src = formattedURL;

            // Handle iframe load
            browserFrame.onload = function() {
                showLoading(false);
                statusBar.textContent = `Loaded: ${formattedURL}`;
            };

            // Handle iframe error
            browserFrame.onerror = function() {
                showLoading(false);
                showError(`Unable to load: ${formattedURL}. The website may not allow embedding or may be offline.`);
                statusBar.textContent = `Error loading: ${formattedURL}`;
            };

            // Set a timeout for loading
            setTimeout(() => {
                if (loadingSpinner.classList.contains('active')) {
                    showLoading(false);
                }
            }, 10000);
        }

        // Show/hide loading spinner
        function showLoading(show) {
            if (show) {
                loadingSpinner.classList.add('active');
            } else {
                loadingSpinner.classList.remove('active');
            }
        }

        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        // Clear error message
        function clearError() {
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';
        }

        // Clear all
        function clearAll() {
            urlInput.value = '';
            browserFrame.src = '';
            statusBar.textContent = 'Ready';
            clearError();
            showLoading(false);
            urlInput.focus();
        }

        // Event listeners
        goBtn.addEventListener('click', loadWebsite);
        clearBtn.addEventListener('click', clearAll);

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadWebsite();
            }
        });

        // Focus on input on page load
        urlInput.focus();
    </script>
</body>
</html>
