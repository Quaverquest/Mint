<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint OS v8 - Modular</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <span>MINT OS v8</span>
            <span class="reset-btn" onclick="resetOS()">⟳</span>
        </div>
        <div class="file-list" id="file-list"></div>
        <div class="sidebar-controls">
            <button class="btn" onclick="showNewFile()">+ New File</button>
            <button class="btn" onclick="createBrowserTab()">+ New Browser</button>
        </div>
    </div>

    <div class="workspace">
        <div class="toolbar">
            <button class="btn" onclick="toggleSplit()" id="btn-split">🌗</button>
            <div class="address-wrapper">
                <input type="text" class="address-bar" id="omni-bar" placeholder="Search Google or Enter URL..." onkeydown="if(event.key==='Enter') handleNavigation()">
            </div>
            <label class="toggle" title="Turn ON to fix 'Refused to Connect'">
                <input type="checkbox" id="stealth-mode">
                <div class="slider"></div>
                <span>Stealth Mode</span>
            </label>
            <button class="btn toolbar-open-btn" id="btn-open-tab" onclick="openCurrentInTab()" title="Open in New Tab" style="display:none">↗</button>
            <button class="btn" onclick="runProject()">▶ Run</button>
        </div>

        <div class="view-stack">
            <div class="editor-pane" id="pane-editor">
                <textarea class="code-area" id="code-input" oninput="updateFile()" spellcheck="false"></textarea>
            </div>
            <div class="preview-pane" id="pane-preview" style="display:none">
                <span class="pane-label">PREVIEW</span>
                <iframe id="web-frame"></iframe>
                <!-- Blocked-site overlay -->
                <div class="blocked-overlay" id="blocked-overlay" style="display:none">
                    <div class="blocked-box">
                        <div class="blocked-icon">🔒</div>
                        <h3>Site Blocked Embedding</h3>
                        <p>This site refuses to load inside a frame.<br>Try <strong>Stealth Mode</strong> or open it directly.</p>
                        <button class="btn btn-primary" onclick="openCurrentInTab()">↗ Open in New Tab</button>
                        <button class="btn" onclick="retryWithStealth()">🛡 Try Stealth Mode</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="status-bar">
            <span id="status">Ready</span>
            <span id="mem-usage">0kb</span>
        </div>
    </div>

    <!-- New File Modal -->
    <div class="modal-overlay" id="modal-new">
        <div class="modal">
            <h3>Create File</h3>
            <div class="input-group">
                <label>Filename (e.g., style.css)</label>
                <input type="text" class="modal-input" id="new-filename" placeholder="index.html">
            </div>
            <button class="btn btn-primary" onclick="confirmNewFile()">Create</button>
            <button class="btn" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
